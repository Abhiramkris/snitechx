<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snitechx</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Load the navbar component -->
    <script type="module" src="./components/navbar.js"></script>
</head>
<body>
    <!-- The custom navbar component -->
    <snitechx-navbar></snitechx-navbar>

    <main class="hero-container">
        <div class="hero-wrapper">
            <div class="hero-box">
                <h1>THE FUTURE OF INFRASTRUCTURE, SECURED</h1>
                <p>We provide the technical precision and reliability required to turn digital complexity into a competitive advantage</p>

                <div class="hero-mockup-container">
                    <img src="./assets/heroMobile.png" alt="Mobile App Mockup" class="hero-mockup" />
                </div>

                <!-- CTA pill pinned to bottom inside the blue box -->
                <div class="cta-input-container">
                    <input type="email" placeholder="Enter email for free discovery call..." class="discovery-input" />
                    <button class="discovery-button">Get in touch!</button>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
